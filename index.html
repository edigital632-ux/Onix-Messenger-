<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Onix Messenger Pro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { 
            --onix-green: #008069; 
            --bg-light: #f0f2f5; 
            --text-main: #111b21;
            --text-secondary: #667781;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { background-color: #d1d7db; height: 100dvh; display: flex; justify-content: center; overflow: hidden; }

        .app-container { 
            width: 100%; 
            max-width: 500px; 
            background: white; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }

        /* --- AUTH --- */
        #sessao-autenticacao { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100%; padding: 25px; background: var(--bg-light); z-index: 2000;
        }
        .card-auth { background: white; padding: 30px; border-radius: 15px; width: 100%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .card-auth h1 { color: var(--onix-green); margin-bottom: 20px; }
        .card-auth input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        .card-auth button { width: 100%; padding: 15px; background: var(--onix-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* --- HEADER --- */
        header { 
            padding: 15px 16px; background: white; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; 
        }
        header h1 { font-size: 22px; color: var(--onix-green); font-weight: bold; }
        .header-icons { display: flex; gap: 20px; color: var(--text-secondary); }
        .header-icons span { cursor: pointer; font-size: 26px; }

        /* BUSCA DINÂMICA */
        #container-busca { 
            padding: 10px 16px; background: white; border-bottom: 1px solid #f0f0f0; 
            display: none; 
        }
        .search-bar { background: var(--bg-light); display: flex; align-items: center; padding: 10px 15px; border-radius: 20px; gap: 10px; }
        .search-bar input { background: transparent; border: none; outline: none; flex: 1; font-size: 16px; }

        /* MENU */
        #menu-suspenso { 
            display: none; position: absolute; top: 60px; right: 15px; 
            background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border-radius: 8px; z-index: 1000; width: 180px; 
        }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid #f5f5f5; cursor: pointer; color: var(--text-main); }

        /* CONTEÚDO PRINCIPAL */
        main { flex: 1; overflow-y: auto; background: white; position: relative; }
        .tela-interna { display: none; height: 100%; }
        .active { display: block !important; }

        /* LISTA DE CONTATOS */
        .contato-item { 
            padding: 15px 16px; display: flex; align-items: center; gap: 15px; 
            border-bottom: 1px solid #f9f9f9; cursor: pointer; 
        }
        .contato-item:active { background-color: #f5f5f5; }
        .avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background: #dfe5e7; }
        .contato-info { flex: 1; }
        .contato-info h4 { font-size: 16px; color: var(--text-main); }
        .contato-info p { font-size: 14px; color: var(--text-secondary); }

        /* PERFIL */
        #aba-perfil { padding: 30px; text-align: center; }
        .foto-perfil-container { position: relative; width: 140px; height: 140px; margin: 0 auto 25px; }
        #img-perfil { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--onix-green); }
        .btn-camera { 
            position: absolute; bottom: 5px; right: 5px; background: var(--onix-green); 
            color: white; border-radius: 50%; padding: 10px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .campo-edit { text-align: left; margin-bottom: 20px; }
        .campo-edit label { font-size: 13px; color: var(--onix-green); font-weight: bold; padding-left: 5px; }
        .campo-edit input { width: 100%; padding: 12px; border: none; border-bottom: 2px solid #eee; font-size: 16px; outline: none; }

        /* --- NAVEGAÇÃO INFERIOR (CÁ EMBAIXO) --- */
        nav { 
            height: 75px; border-top: 1px solid #f0f0f0; display: flex; 
            background: white; padding-bottom: env(safe-area-inset-bottom); 
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; font-size: 12px; color: var(--text-secondary); cursor: pointer; 
        }
        .active-nav { color: var(--text-main); font-weight: bold; }
        .active-nav span { 
            background: #dcf8c6; border-radius: 20px; padding: 4px 22px; 
            margin-bottom: 4px; font-variation-settings: 'FILL' 1; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="sessao-autenticacao">
            <div id="card-login" class="card-auth">
                <h1>Onix Messenger</h1>
                <input type="email" id="l-email" placeholder="E-mail">
                <input type="password" id="l-senha" placeholder="Senha">
                <button id="btn-entrar">ENTRAR</button>
                <p style="margin-top:20px; color:var(--onix-green); cursor:pointer;" id="go-cad">Criar Conta</p>
            </div>
            <div id="card-cad" class="card-auth" style="display:none;">
                <h1>Cadastrar</h1>
                <input type="text" id="c-nome" placeholder="Nome">
                <input type="tel" id="c-tel" placeholder="Telefone">
                <input type="email" id="c-email" placeholder="E-mail">
                <input type="password" id="c-senha" placeholder="Senha">
                <button id="btn-cad">CADASTRAR</button>
                <p style="margin-top:20px; color:var(--onix-green); cursor:pointer;" id="go-log">Já tenho conta</p>
            </div>
        </div>

        <div id="tela-app" style="display:none; flex-direction:column; height:100%;">
            <header>
                <h1>Onix Messenger</h1>
                <div class="header-icons">
                    <span class="material-symbols-outlined" id="btn-busca">search</span>
                    <span class="material-symbols-outlined" id="btn-more">more_vert</span>
                </div>
                <div id="menu-suspenso">
                    <div class="menu-item" id="btn-sair" style="color:red; font-weight:bold;">Sair</div>
                </div>
            </header>

            <div id="container-busca">
                <div class="search-bar">
                    <span class="material-symbols-outlined">search</span>
                    <input type="text" id="input-busca" placeholder="Pesquisar por número...">
                </div>
            </div>

            <main>
                <div id="aba-conversas" class="tela-interna active">
                    <div id="render-contatos">
                        <p style="text-align:center; padding:50px; color:#999;">Pesquise um contato para conversar.</p>
                    </div>
                </div>
